# Railway build config for the MVS Foundation CRM Portal.
#
# tesseract-ocr is only needed by the Syllabus Manager screenshot reader
# (Weightage by Content table pasted as an image). Everything else works
# without it: if the binary is missing the screenshot button returns a clear
# message and the "paste as text" path keeps working.
#
# tesseract-ocr-hin adds Devanagari, needed for Hindi weightage tables.

[phases.setup]
aptPkgs = ["tesseract-ocr", "tesseract-ocr-hin"]
